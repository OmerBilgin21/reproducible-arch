unbind r
bind  r source-file ~/reproducible-arch/zsh/.tmux.conf

set -g prefix C-e
set -g mouse on
set -g escape-time 10
set -g default-terminal "tmux-256color"
set -g xterm-keys on
set -g base-index 1
set -g renumber-windows on
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set-option -g status-position top
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
set -g window-status-format "#I: #W"
set -g window-status-current-format "#I: #W"
set -g mode-keys vi

# splits
bind-key C-h split-window -h
bind-key C-v split-window -v

# navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n S-Left  previous-window
bind -n S-Right next-window

# copy modes
unbind v
unbind V
unbind C-v
unbind y

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

thm_bg="#2d353b"
thm_fg="#d3c6aa"
thm_cyan="#7fbbb3"
thm_black="#232a2e"
thm_gray="#475258"
thm_magenta="#d699b6"
thm_pink="#e67e80"
thm_red="#e67e80"
thm_green="#a7c080"
thm_yellow="#dbbc7f"
thm_blue="#7fbbb3"
thm_orange="#e69875"
thm_black4="#5c6a72"

# below is theming that even I don't understand
set -g message-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
set -g message-command-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-separator " "
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-current-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_magenta},bg=${thm_bg}](✓) #[fg=${thm_cyan},bg=${thm_bg}]#(echo '#{b:pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=${thm_magenta},bg=${thm_bg}]"
set -g window-status-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_fg},bg=${thm_bg}]#W"
set -g status-right "#[fg=${thm_blue},bg=${thm_bg},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_blue},nobold,nounderscore,noitalics] #[fg=${thm_fg},bg=${thm_gray}] #W #{?client_prefix,#[fg=${thm_magenta}],#[fg=${thm_cyan}]}#[bg=${thm_gray}]#{?client_prefix,#[bg=${thm_magenta}],#[bg=${thm_cyan}]}#[fg=${thm_bg}] #[fg=${thm_fg},bg=${thm_gray}] #S "
set -g clock-mode-colour "${thm_blue}"
set -g mode-style "fg=${thm_blue} bg=${thm_black4} bold"

# status bar settings
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""

# session/window management
unbind s
unbind p
unbind n
unbind o

bind-key n display-popup -E 'tmux-session-creator'
bind-key p display-popup -E 'tmux-window-picker'
bind-key -T session-menu Escape switch-client -T prefix
bind-key t command-prompt -I "#S" "rename-session '%%'"
